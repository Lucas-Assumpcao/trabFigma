<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Academia Top</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <header class="header">
            <h1>Academia top</h1>
        </header>

        <section class="content-registration">
            <div class="form-card">
                <h3>Cadastro novo aluno:</h3>
                
                <form>
                    <div class="input-group">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome">
                    </div>

                    <div class="input-group">
                        <label for="telefone">Telefone:</label>
                        <input type="tel" id="telefone" name="telefone">
                    </div>

                    <div class="input-group">
                        <label for="email">E-MAIL:</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="input-group">
                        <label for="sexo">Coloque seu sexo:</label>
                        <input type="text" id="sexo" name="sexo">
                    </div>

                    <button type="submit" class="btn-ok">OK</button>
                </form>
            </div>

            <div class="side-text">
                <p>
                    "Transforme sua saúde e condicionamento físico em um ambiente moderno e motivador, com equipamentos de ponta e acompanhamento profissional. Aqui, cada treino aproxima você do seu melhor." 💪
                </p>
            </div>
        </section>
    </main>

</body>
</html>
