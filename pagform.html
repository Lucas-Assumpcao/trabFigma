<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <header>
        <h1>Academia Top</h1>
        <hr>
    </header>
    <body>
        <h1>Cadastro novo aluno:</h1>
    <form action="">
            <p>
        <label for ="nome" >Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
        </p>
        <p>
        <label for="telefone">Telefone:</label>
        <input type="number" id="telefone" name="telefone" placeholder="Digite seu telefone" required>
            </p>
        <p>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
        </p>
        <p>
        <label for="datadeNasc">Data de Nascimento:</label>
        <input type="number" id="datadeNasc" name="datadeNasc" placeholder="Digite sua data de Nascimento" required>
        </p>
        <p>
        <label for="mensagem"></label>
        <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem aqui" required cols="50" rows="5"></textarea>
        </p>
        <p>
        <input type="submit" value="Enviar">
        </p>    
    </form>
        <aside>
         <p>“Transforme sua saúde e condicionamento físico em um ambiente moderno e
             motivador, com equipamentos de ponta e acompanhamento profissional.
              Aqui, cada treino aproxima você do seu melhor.” 💪</p>
        </aside>

    </body>
</html>
