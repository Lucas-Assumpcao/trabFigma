<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Top</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <header class="header">
            <h1>Academia top</h1>
        </header>

        <section class="content">
            <div class="left-column">
                <p class="description">
                    Seu objetivo começa aqui. Treinos eficientes, estrutura completa e motivação para você evoluir todos os dias. 🔥
                </p>
                <div class="image-box">
                    <img src="https://via.placeholder.com/400x250/333/fff?text=Treino+Pesado" alt="Pessoa treinando">
                </div>
            </div>

            <div class="right-column">
                <div class="hours-card">
                    <h2>HORÁRIO DE FUNCIONAMENTO</h2>
                    <div class="divider"></div>
                    <p><strong>DE SEGUNDA A SEXTA</strong></p>
                    <p>das 05h00 às 17h00</p>
                    <div class="divider-small"></div>
                    <p><strong>SÁBADOS</strong></p>
                    <p>das 08h00 às 12h00</p>
                </div>

                <a href="#" class="btn-register">CADASTRE-SE</a>
            </div>
        </section>
    </main>

</body>
</html>
